<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseBoard — Smartboard Presentation</title>
  <meta name="description" content="Interactive visual explainer presentation, optimised for classroom smartboards." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --indigo-400:  #818cf8;
      --indigo-500:  #6366f1;
      --indigo-600:  #4f46e5;
      --indigo-700:  #4338ca;
      --slate-400:   #94a3b8;
      --slate-500:   #64748b;
      --slate-600:   #475569;
      --slate-700:   #334155;
      --slate-800:   #1e293b;
      --slate-900:   #0f172a;
      --slate-950:   #020617;
      --emerald-400: #34d399;
      --emerald-500: #10b981;
      --emerald-600: #059669;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--slate-950);
      color: #e2e8f0;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Layout ─────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Top bar ─────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--slate-900);
      border-bottom: 1px solid var(--slate-800);
      padding: 0.875rem 1.5rem;
      flex-shrink: 0;
      gap: 1rem;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 0;
    }
    .logo-chip {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.25rem;
      height: 2.25rem;
      background: var(--indigo-600);
      border-radius: 0.5rem;
      flex-shrink: 0;
      color: #fff;
    }
    .topbar-mode {
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      color: var(--indigo-400);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .topbar-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 32rem;
    }
    .topbar-right { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }

    #back-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      background: var(--slate-800);
      color: var(--slate-400);
      border: none;
      border-radius: 0.6rem;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.825rem;
      cursor: pointer;
      transition: background .15s, color .15s;
      text-decoration: none;
    }
    #back-btn:hover { background: var(--slate-700); color: #e2e8f0; }

    /* ── Stage (main presentation area) ──────────────────── */
    #stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1.5rem;
      gap: 1.25rem;
    }

    /* ── Dots nav ─────────────────────────────────────────── */
    #dots-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .dot {
      height: 8px;
      border-radius: 999px;
      background: var(--slate-700);
      border: none;
      cursor: pointer;
      transition: width .3s ease, background .2s ease;
      width: 8px;
      padding: 0;
    }
    .dot.active { width: 2.5rem; background: var(--indigo-500); }
    .dot:not(.active):hover { background: var(--slate-600); }

    /* ── Slide card ───────────────────────────────────────── */
    #slide-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      background: rgba(15,23,42,.55);
      backdrop-filter: blur(8px);
      border: 1px solid var(--slate-800);
      border-radius: 1.25rem;
      padding: clamp(1.25rem, 3vw, 2.5rem);
      overflow-y: auto;
      opacity: 0;
      transform: translateX(48px);
      transition: opacity .28s ease, transform .28s ease;
      pointer-events: none;
    }
    .slide.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }
    .slide.exit-left {
      opacity: 0;
      transform: translateX(-48px);
    }

    .slide-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .step-badge {
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      color: var(--indigo-400);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .live-pill {
      background: rgba(99,102,241,.18);
      color: #a5b4fc;
      font-size: 0.68rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 0.35rem;
      letter-spacing: 0.06em;
    }

    .slide-phase {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      font-weight: 800;
      color: #f1f5f9;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .slide-description {
      color: #94a3b8;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      line-height: 1.75;
      max-width: 56rem;
    }

    .bullets {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      padding-top: 0.25rem;
    }
    .bullet {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      font-size: clamp(0.85rem, 1.8vw, 1rem);
      color: #64748b;
      line-height: 1.55;
    }
    .bullet-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--indigo-500);
      flex-shrink: 0;
      margin-top: 0.45em;
    }

    /* ── Bottom nav ───────────────────────────────────────── */
    #bottom-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-shrink: 0;
      padding: 0 0.25rem;
    }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 1.75rem;
      border: none;
      border-radius: 0.75rem;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.925rem;
      cursor: pointer;
      transition: background .15s, color .15s, transform .1s, box-shadow .15s;
      min-height: 3rem;
      min-width: 7rem;
      justify-content: center;
    }
    .nav-btn:active { transform: scale(0.97); }

    #prev-btn {
      background: var(--slate-800);
      color: #e2e8f0;
    }
    #prev-btn:hover:not(:disabled) { background: var(--slate-700); }
    #prev-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .slide-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.825rem;
      font-weight: 600;
      color: var(--slate-400);
    }

    #next-btn {
      background: var(--indigo-600);
      color: #fff;
      box-shadow: 0 4px 12px rgba(79,70,229,.35);
    }
    #next-btn:hover { background: var(--indigo-700); box-shadow: 0 6px 16px rgba(79,70,229,.45); }
    #next-btn.finish { background: var(--emerald-600); box-shadow: 0 4px 12px rgba(5,150,105,.35); }
    #next-btn.finish:hover { background: #047857; }

    /* ── Footer bar ───────────────────────────────────────── */
    #footerbar {
      display: flex;
      justify-content: space-between;
      background: var(--slate-900);
      border-top: 1px solid var(--slate-800);
      padding: 0.5rem 1.5rem;
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--slate-600);
      flex-shrink: 0;
    }

    /* ── Loading / error states ───────────────────────────── */
    #loading-state, #error-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 3rem;
      height: 3rem;
      border: 3px solid var(--slate-800);
      border-top-color: var(--indigo-500);
      border-right-color: var(--indigo-500);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: #e2e8f0;
    }
    .state-sub { font-size: 0.9rem; color: var(--slate-500); }
    .err-icon { font-size: 2.5rem; }
    .retry-link {
      margin-top: 0.5rem;
      padding: 0.6rem 1.5rem;
      background: var(--indigo-600);
      color: #fff;
      border-radius: 0.6rem;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
      transition: background .15s;
      text-decoration: none;
      display: inline-block;
    }
    .retry-link:hover { background: var(--indigo-700); }
  </style>
</head>
<body>

<div id="app">
  <!-- Top bar -->
  <div id="topbar">
    <div class="topbar-left">
      <div class="logo-chip">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>
        </svg>
      </div>
      <div>
        <div class="topbar-mode">Smartboard Presentation Mode</div>
        <div class="topbar-title" id="topbar-title">Loading…</div>
      </div>
    </div>
    <div class="topbar-right">
      <a href="index.html" id="back-btn" aria-label="Back to library">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Library
      </a>
    </div>
  </div>

  <!-- Loading state (shown while fetching) -->
  <div id="loading-state">
    <div class="spinner"></div>
    <div class="state-title">Loading Explainer…</div>
    <div class="state-sub">Fetching from Backblaze B2</div>
  </div>

  <!-- Error state (shown on failure) -->
  <div id="error-state" style="display:none;">
    <div class="err-icon">⚠️</div>
    <div class="state-title" id="error-title">Explainer not found</div>
    <div class="state-sub" id="error-sub">This explainer may have been deleted or the ID is invalid.</div>
    <a href="index.html" class="retry-link">← Back to Library</a>
  </div>

  <!-- Presentation stage (hidden until data loads) -->
  <div id="stage" style="display:none;">
    <!-- Dot nav -->
    <div id="dots-nav" role="navigation" aria-label="Slide navigation"></div>

    <!-- Slide viewport -->
    <div id="slide-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Bottom nav -->
    <div id="bottom-nav">
      <button id="prev-btn" class="nav-btn" onclick="prevSlide()" aria-label="Previous slide">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Previous
      </button>

      <div class="slide-counter" id="slide-counter">—</div>

      <button id="next-btn" class="nav-btn" onclick="nextSlide()" aria-label="Next slide">
        Next Step
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Footer bar -->
  <div id="footerbar">
    <span>PulseBoard Visual Core — NVIDIA NIM + Backblaze B2</span>
    <span id="manifest-link">Press ← → or arrow keys to navigate • ESC to exit</span>
  </div>
</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const API_BASE = 'http://localhost:8000';

  // ── State ─────────────────────────────────────────────────────────────────
  let explainer = null;
  let currentStep = 0;
  let totalSteps  = 0;

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const loadingEl   = document.getElementById('loading-state');
  const errorEl     = document.getElementById('error-state');
  const stageEl     = document.getElementById('stage');
  const dotsNav     = document.getElementById('dots-nav');
  const slideContainer = document.getElementById('slide-container');
  const prevBtn     = document.getElementById('prev-btn');
  const nextBtn     = document.getElementById('next-btn');
  const counterEl   = document.getElementById('slide-counter');
  const topbarTitle = document.getElementById('topbar-title');
  const manifestEl  = document.getElementById('manifest-link');

  // ── Boot ──────────────────────────────────────────────────────────────────
  async function init() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id) {
      showError('No explainer ID provided', 'Please generate an explainer from the home screen first.');
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/api/explainer/${encodeURIComponent(id)}`);
      if (res.status === 404) {
        showError('Explainer not found', `No explainer with ID "${id}" exists in the library.`);
        return;
      }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      explainer   = data.explainer;
      totalSteps  = explainer.steps.length;
      currentStep = 0;

      setupPresentation();
    } catch (err) {
      showError('Failed to load explainer', err.message);
    }
  }

  // ── Setup ─────────────────────────────────────────────────────────────────
  function setupPresentation() {
    topbarTitle.textContent = explainer.title;
    document.title = `PulseBoard — ${explainer.title}`;

    if (explainer.manifest_url) {
      manifestEl.innerHTML = `<a href="${escHtml(explainer.manifest_url)}" target="_blank" style="color:var(--slate-500);text-decoration:none;" aria-label="View provenance manifest">Provenance manifest ↗</a>  •  Press ← → to navigate • ESC to exit`;
    }

    // Build dots
    dotsNav.innerHTML = explainer.steps.map((_, i) => `
      <button class="dot ${i === 0 ? 'active' : ''}" id="dot-${i}" onclick="goToSlide(${i})" aria-label="Go to slide ${i + 1}" title="Slide ${i + 1}"></button>
    `).join('');

    // Build all slides (hidden, then animate in)
    slideContainer.innerHTML = explainer.steps.map((step, i) => `
      <div class="slide ${i === 0 ? 'active' : ''}" id="slide-${i}" role="region" aria-label="Slide ${i + 1}: ${escHtml(step.phase)}">
        <div class="slide-meta">
          <span class="step-badge font-mono">STEP ${i + 1} OF ${totalSteps}</span>
          <span class="live-pill">Live Active</span>
        </div>
        <h2 class="slide-phase font-display">${escHtml(step.phase)}</h2>
        <p class="slide-description">${escHtml(step.description)}</p>
        <div class="bullets">
          ${step.bullets.map(b => `
            <div class="bullet">
              <span class="bullet-dot"></span>
              <span>${escHtml(b)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');

    loadingEl.style.display = 'none';
    stageEl.style.display = 'flex';
    updateNavState();
  }

  // ── Navigation ────────────────────────────────────────────────────────────
  function goToSlide(idx) {
    if (idx < 0 || idx >= totalSteps) return;
    const prevIdx = currentStep;

    // Animate out current
    const prevSlideEl = document.getElementById(`slide-${prevIdx}`);
    if (prevSlideEl) {
      prevSlideEl.classList.remove('active');
      if (idx > prevIdx) {
        prevSlideEl.classList.add('exit-left');
      } else {
        prevSlideEl.style.transform = 'translateX(48px)';
        prevSlideEl.style.opacity = '0';
      }
      setTimeout(() => {
        prevSlideEl.classList.remove('exit-left');
        prevSlideEl.style.transform = '';
        prevSlideEl.style.opacity = '';
      }, 300);
    }

    // Update dots
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === idx);
    });

    currentStep = idx;
    const nextSlideEl = document.getElementById(`slide-${idx}`);
    if (nextSlideEl) {
      // Direction hint
      if (idx < prevIdx) {
        nextSlideEl.style.transform = 'translateX(-48px)';
        nextSlideEl.style.transition = 'none';
        requestAnimationFrame(() => {
          nextSlideEl.style.transition = '';
          nextSlideEl.classList.add('active');
        });
      } else {
        nextSlideEl.classList.add('active');
      }
    }

    updateNavState();
  }

  function nextSlide() {
    if (currentStep < totalSteps - 1) {
      goToSlide(currentStep + 1);
    } else {
      // Last slide — go back to library
      window.location.href = 'index.html';
    }
  }

  function prevSlide() {
    if (currentStep > 0) goToSlide(currentStep - 1);
  }

  function updateNavState() {
    const isLast = currentStep === totalSteps - 1;
    prevBtn.disabled = currentStep === 0;
    counterEl.textContent = `Slide ${currentStep + 1} / ${totalSteps}`;

    nextBtn.textContent = '';
    if (isLast) {
      nextBtn.classList.add('finish');
      nextBtn.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Finish &amp; Exit`;
    } else {
      nextBtn.classList.remove('finish');
      nextBtn.innerHTML = `Next Step
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>`;
    }
  }

  // ── Keyboard ──────────────────────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowRight':
      case 'ArrowDown':
        e.preventDefault();
        nextSlide();
        break;
      case 'ArrowLeft':
      case 'ArrowUp':
        e.preventDefault();
        prevSlide();
        break;
      case 'Escape':
        window.location.href = 'index.html';
        break;
    }
  });

  // ── Helpers ───────────────────────────────────────────────────────────────
  function showError(title, sub) {
    loadingEl.style.display = 'none';
    document.getElementById('error-title').textContent = title;
    document.getElementById('error-sub').textContent  = sub;
    errorEl.style.display = 'flex';
  }

  function escHtml(str) {
    return String(str).replace(/[&<>"']/g, m =>
      ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[m])
    );
  }

  // ── Run ───────────────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
